<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tali Design · קטלוג</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;700;800&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --cream:#faf7f2; --cream-2:#f3ece1; --paper:#ffffff;
    --ink:#1a1a18; --ink-soft:#4d473e; --muted:#8c8475; --line:#e8ddca;
    --brass:#b08d57;
    --font-display:"Frank Ruhl Libre", Georgia, serif;
    --font-body:"Assistant", -apple-system, "Segoe UI", sans-serif;
    --maxw:1240px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:var(--font-body); color:var(--ink-soft);
    background:var(--cream);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  ::selection{ background:color-mix(in oklab, var(--brass) 35%, white); }
  img{ display:block; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  a{ color:inherit; text-decoration:none; }
  input,select,textarea{ font-family:inherit; }

  /* ---------- Boot ---------- */
  .boot{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; color:var(--muted); }
  .boot p{ letter-spacing:.04em; font-size:.95rem; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .animate-spin{ animation:spin 1s linear infinite; }

  /* ---------- Nav ---------- */
  .nav{ position:sticky; top:0; z-index:60; background:color-mix(in oklab, var(--cream) 86%, transparent); backdrop-filter:saturate(140%) blur(12px); border-bottom:1px solid var(--line); }
  .nav-inner{ max-width:var(--maxw); margin:0 auto; padding:0 28px; height:70px; display:flex; align-items:center; justify-content:space-between; }
  .nav-brand{ display:flex; align-items:center; gap:12px; }
  .nav-brand img{ height:34px; width:34px; object-fit:contain; }
  .nav-brand span{ font-family:var(--font-display); font-weight:700; font-size:1.35rem; color:var(--ink); letter-spacing:-.01em; }
  .nav-actions{ display:flex; align-items:center; gap:8px; }
  .nav-btn{ display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border-radius:999px; font-weight:600; font-size:.92rem; color:var(--ink-soft); transition:.2s; }
  .nav-btn svg{ font-size:1.05em; }
  .nav-btn:hover{ background:color-mix(in oklab, var(--brass) 14%, transparent); color:var(--ink); }
  .nav-btn.is-active{ background:var(--ink); color:var(--cream); }
  .nav-telemetry{ max-width:var(--maxw); margin:0 auto; padding:6px 28px; display:flex; justify-content:space-between; font-size:.72rem; color:var(--muted); letter-spacing:.05em; }
  .nav-telemetry .on{ color:#2f7d4f; display:inline-flex; gap:5px; align-items:center; }
  .nav-telemetry .off{ color:#b0703a; display:inline-flex; gap:5px; align-items:center; }

  .main{ max-width:var(--maxw); margin:0 auto; padding:0 28px 80px; }

  /* ---------- Buttons ---------- */
  .btn-brass,.btn-ink-sm,.btn-ghost-ink,.nav-btn{ white-space:nowrap; }
  .btn-brass{ display:inline-flex; align-items:center; justify-content:center; gap:9px; background:var(--brass); color:#fff; font-weight:700; padding:13px 26px; border-radius:999px; transition:.25s; box-shadow:0 12px 30px -14px color-mix(in oklab, var(--brass) 80%, black); }
  .btn-brass:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  .btn-ink-sm{ display:inline-flex; align-items:center; gap:8px; background:var(--ink); color:var(--cream); font-weight:600; font-size:.86rem; padding:10px 20px; border-radius:999px; transition:.25s; }
  .btn-ink-sm:hover{ transform:translateY(-1px); box-shadow:0 12px 26px -16px var(--ink); }
  .btn-ghost-ink{ display:inline-flex; align-items:center; gap:9px; border:1.5px solid var(--ink); color:var(--ink); font-weight:700; padding:11px 22px; border-radius:999px; transition:.25s; }
  .btn-ghost-ink:hover{ background:var(--ink); color:var(--cream); }

  /* ---------- Hero ---------- */
  .hero{ text-align:center; padding:74px 16px 30px; position:relative; }
  .hero-eyebrow{ display:inline-flex; align-items:center; gap:8px; font-size:.8rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--brass); margin-bottom:22px; }
  .hero-eyebrow svg{ font-size:1.05em; }
  .hero-logo{ height:96px; width:auto; object-fit:contain; margin:0 auto 14px; }
  .hero-title{ font-family:var(--font-display); font-weight:900; color:var(--ink); font-size:clamp(2.8rem, 7vw, 5rem); line-height:1.02; letter-spacing:-.02em; margin:0; }
  .hero-tagline{ font-size:clamp(1.05rem,2.2vw,1.4rem); color:var(--ink-soft); margin:18px auto 0; max-width:560px; font-weight:300; }
  .hero-meta{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:14px; margin-top:30px; }
  .hero-chip{ display:inline-flex; align-items:center; gap:8px; font-size:.9rem; font-weight:500; color:var(--ink-soft); background:var(--paper); padding:9px 18px; border-radius:999px; border:1px solid var(--line); }
  .hero-chip svg{ color:var(--brass); }
  .hero-rule{ display:flex; justify-content:center; margin-top:40px; }
  .hero-rule span{ width:64px; height:2px; background:var(--brass); position:relative; }
  .hero-rule span::before,.hero-rule span::after{ content:""; position:absolute; top:50%; width:6px; height:6px; border-radius:50%; background:var(--brass); transform:translateY(-50%); }
  .hero-rule span::before{ left:-16px; } .hero-rule span::after{ right:-16px; }

  /* ---------- Controls ---------- */
  .controls{ display:flex; flex-wrap:wrap; gap:18px; align-items:center; justify-content:space-between; margin:8px 0 34px; }
  .cat-tabs{ display:flex; flex-wrap:wrap; gap:8px; }
  .cat-tab{ padding:9px 20px; border-radius:999px; font-weight:600; font-size:.92rem; color:var(--ink-soft); border:1px solid var(--line); background:var(--paper); transition:.2s; }
  .cat-tab:hover{ border-color:var(--brass); color:var(--ink); }
  .cat-tab.is-active{ background:var(--ink); color:var(--cream); border-color:var(--ink); }
  .search{ display:flex; align-items:center; gap:9px; background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:0 16px; min-width:230px; flex:0 1 280px; transition:.2s; }
  .search:focus-within{ border-color:var(--brass); box-shadow:0 0 0 3px color-mix(in oklab,var(--brass) 16%,transparent); }
  .search svg{ color:var(--muted); }
  .search input{ border:none; outline:none; background:none; padding:12px 0; width:100%; font-size:.95rem; color:var(--ink); }

  /* ---------- Grid + Card (base) ---------- */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(258px,1fr)); gap:30px; }
  .pc{ position:relative; display:flex; flex-direction:column; background:var(--paper); }
  .pc-media{ position:relative; aspect-ratio:1/1; overflow:hidden; background:#fff; }
  .pc-media img{ width:100%; height:100%; object-fit:cover; transition:transform .7s cubic-bezier(.2,.7,.2,1); }
  .pc:hover .pc-media img{ transform:scale(1.06); }
  .pc-price{ position:absolute; top:14px; inset-inline-start:14px; background:var(--ink); color:var(--cream); font-weight:700; font-size:.85rem; padding:6px 14px; border-radius:999px; letter-spacing:.02em; }
  .pc-view{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:8px; background:color-mix(in oklab, var(--ink) 30%, transparent); color:#fff; opacity:0; transition:opacity .35s; font-size:.78rem; letter-spacing:.16em; text-transform:uppercase; font-weight:600; }
  .pc-view svg{ font-size:1.1em; }
  .pc:hover .pc-view{ opacity:1; }
  .pc-hoverinfo{ display:none; }
  .pc-body{ display:flex; flex-direction:column; gap:8px; padding:20px 4px 6px; flex:1; }
  .pc-title{ font-family:var(--font-display); font-weight:700; color:var(--ink); font-size:1.28rem; line-height:1.15; }
  .pc-desc{ font-size:.92rem; color:var(--muted); line-height:1.5; margin:0; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .pc-foot{ display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:10px; }
  .pc-foot-price{ font-weight:700; color:var(--brass); font-size:1.05rem; }
  .pc-foot-link{ display:inline-flex; align-items:center; gap:3px; font-size:.84rem; font-weight:600; color:var(--ink-soft); letter-spacing:.02em; }

  /* ===== Direction A — בוטיק (editorial) ===== */
  body[data-dir="a"] .grid{ grid-template-columns:repeat(auto-fill, minmax(244px,1fr)); gap:46px 36px; }
  body[data-dir="a"] .pc{ background:transparent; text-align:center; }
  body[data-dir="a"] .pc-media{ border:1px solid var(--line); }
  body[data-dir="a"] .pc-price{ display:none; }
  body[data-dir="a"] .pc-body{ padding:20px 8px 0; align-items:center; gap:6px; }
  body[data-dir="a"] .pc-foot{ flex-direction:column; gap:4px; justify-content:center; padding-top:8px; }
  body[data-dir="a"] .pc-foot-link{ display:none; }
  body[data-dir="a"] .pc-foot-price{ font-family:var(--font-display); letter-spacing:.06em; }

  /* ===== Direction B — נועז (bold cards) ===== */
  body[data-dir="b"] .pc{ border-radius:20px; overflow:hidden; box-shadow:0 2px 4px rgba(26,26,24,.04); border:1px solid var(--line); transition:box-shadow .3s, transform .3s; }
  body[data-dir="b"] .pc:hover{ box-shadow:0 26px 50px -28px rgba(26,26,24,.4); transform:translateY(-4px); }
  body[data-dir="b"] .pc-body{ padding:20px 20px 22px; }
  body[data-dir="b"] .pc-foot{ border-top:1px solid var(--line); }

  /* ===== Direction C — גלריה (gallery overlay) ===== */
  body[data-dir="c"] .grid{ grid-template-columns:repeat(auto-fill, minmax(206px,1fr)); gap:14px; }
  body[data-dir="c"] .pc{ border:1px solid var(--brass); }
  body[data-dir="c"] .pc-view{ display:none; }
  body[data-dir="c"] .pc-price{ display:none; }
  body[data-dir="c"] .pc-body{ display:none; }
  body[data-dir="c"] .pc-hoverinfo{ display:flex; flex-direction:column; gap:4px; position:absolute; inset:auto 0 0 0; padding:40px 16px 16px; background:linear-gradient(to top, rgba(20,20,18,.92), rgba(20,20,18,.55) 55%, transparent); color:#fff; transform:translateY(10px); opacity:0; transition:.4s cubic-bezier(.2,.7,.2,1); }
  body[data-dir="c"] .pc:hover .pc-hoverinfo{ transform:none; opacity:1; }
  body[data-dir="c"] .pc-hoverinfo h3{ font-family:var(--font-display); font-weight:700; font-size:1.1rem; margin:0; }
  body[data-dir="c"] .pc-hoverinfo span{ color:color-mix(in oklab, var(--brass) 70%, white); font-weight:700; font-size:.95rem; }

  /* ---------- Reveal ---------- */
  .reveal{ opacity:0; transform:translateY(26px); transition:opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.is-in{ opacity:1; transform:none; }
  @media (prefers-reduced-motion:reduce){ .reveal{ opacity:1; transform:none; transition:none; } }

  /* ---------- Empty ---------- */
  .empty-state{ display:flex; flex-direction:column; align-items:center; gap:14px; padding:80px 20px; color:var(--muted); background:color-mix(in oklab,var(--paper) 60%,transparent); border:1px dashed var(--line); border-radius:24px; }
  .empty-ico{ font-size:46px; color:var(--brass); opacity:.55; }
  .empty-state p{ font-size:1.1rem; font-weight:500; margin:0; }

  /* ---------- Lightbox ---------- */
  .lb-overlay{ position:fixed; inset:0; z-index:120; background:color-mix(in oklab, var(--ink) 60%, transparent); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:24px; animation:fade .25s ease; }
  @keyframes fade{ from{ opacity:0; } } @keyframes pop{ from{ opacity:0; transform:scale(.96) translateY(8px); } }
  .lb-card{ background:var(--paper); border-radius:24px; overflow:hidden; max-width:920px; width:100%; max-height:90vh; display:grid; grid-template-columns:1.05fr 1fr; position:relative; animation:pop .3s cubic-bezier(.2,.7,.2,1); box-shadow:0 40px 90px -30px rgba(0,0,0,.5); }
  .lb-close{ position:absolute; top:16px; inset-inline-end:16px; z-index:2; width:40px; height:40px; border-radius:50%; background:color-mix(in oklab,var(--cream) 80%, transparent); display:flex; align-items:center; justify-content:center; color:var(--ink); font-size:20px; transition:.2s; }
  .lb-close:hover{ background:var(--ink); color:var(--cream); }
  .lb-media{ background:var(--cream-2); }
  .lb-media img{ width:100%; height:100%; object-fit:cover; }
  .lb-info{ padding:42px 40px; display:flex; flex-direction:column; overflow-y:auto; }
  .lb-eyebrow{ font-size:.74rem; letter-spacing:.2em; text-transform:uppercase; color:var(--brass); font-weight:700; }
  .lb-info h2{ font-family:var(--font-display); font-weight:700; color:var(--ink); font-size:2rem; line-height:1.1; margin:14px 0 0; }
  .lb-price{ font-size:1.5rem; font-weight:700; color:var(--brass); margin-top:14px; }
  .lb-desc{ color:var(--ink-soft); line-height:1.7; margin:18px 0 0; font-size:1rem; }
  .lb-actions{ display:flex; flex-wrap:wrap; gap:12px; margin-top:30px; }
  @media (max-width:720px){ .lb-card{ grid-template-columns:1fr; max-height:92vh; } .lb-media{ aspect-ratio:4/3; } }

  /* ---------- Toast ---------- */
  .toast-wrap{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:200; animation:toastin .35s cubic-bezier(.2,.8,.2,1); }
  @keyframes toastin{ from{ opacity:0; transform:translate(-50%,16px); } }
  .toast{ display:flex; align-items:center; gap:12px; padding:14px 18px; border-radius:14px; color:#fff; font-weight:600; box-shadow:0 20px 40px -16px rgba(0,0,0,.5); }
  .toast.is-ok{ background:var(--ink); } .toast.is-err{ background:#b3402f; }
  .toast button{ color:inherit; opacity:.7; display:flex; } .toast button:hover{ opacity:1; }

  /* ---------- Modal ---------- */
  .modal-overlay{ position:fixed; inset:0; z-index:210; background:color-mix(in oklab,var(--ink) 55%,transparent); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; padding:24px; animation:fade .2s; }
  .modal-card{ background:var(--paper); border-radius:22px; padding:34px; max-width:430px; width:100%; animation:pop .25s cubic-bezier(.2,.7,.2,1); box-shadow:0 30px 70px -24px rgba(0,0,0,.5); }
  .modal-ico{ width:54px; height:54px; border-radius:50%; background:#fbecea; color:#b3402f; display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:18px; }
  .modal-card h3{ font-family:var(--font-display); font-weight:700; color:var(--ink); font-size:1.4rem; margin:0 0 10px; }
  .modal-card p{ color:var(--ink-soft); line-height:1.6; margin:0 0 26px; }
  .modal-actions{ display:flex; gap:12px; justify-content:flex-end; }
  .btn-soft{ padding:11px 22px; border-radius:12px; font-weight:700; color:var(--ink-soft); background:var(--cream-2); transition:.2s; } .btn-soft:hover{ background:var(--line); }
  .btn-danger{ padding:11px 22px; border-radius:12px; font-weight:700; color:#fff; background:#b3402f; transition:.2s; } .btn-danger:hover{ filter:brightness(1.08); }

  /* ---------- Footer + FAB ---------- */
  .site-foot{ border-top:1px solid var(--line); background:var(--cream-2); }
  .site-foot-inner{ max-width:var(--maxw); margin:0 auto; padding:30px 28px; display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap; }
  .site-foot-brand{ font-family:var(--font-display); font-weight:700; color:var(--ink); font-size:1.2rem; }
  .site-foot-social{ display:flex; gap:10px; }
  .site-foot-social a{ width:42px; height:42px; border-radius:50%; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:18px; background:var(--paper); transition:.2s; }
  .site-foot-social a:hover{ background:var(--ink); color:var(--cream); border-color:var(--ink); }
  .fab-wa{ position:fixed; bottom:24px; inset-inline-start:24px; z-index:90; display:inline-flex; align-items:center; gap:10px; background:#25a056; color:#fff; padding:13px 18px; border-radius:999px; font-weight:700; box-shadow:0 16px 36px -14px rgba(37,160,86,.8); transition:.25s; }
  .fab-wa svg{ font-size:1.4em; } .fab-wa:hover{ transform:translateY(-2px); filter:brightness(1.05); }
  .fab-wa-label{ font-size:.95rem; }
  @media (max-width:560px){ .fab-wa-label{ display:none; } .fab-wa{ padding:15px; } }

  /* ================= PRINT — landscape catalogue ================= */
  .pdf-root{ display:none; }
  @media print{
    .app-screen{ display:none !important; }
    .pdf-root{ display:block; }
    @page{ size:A4 landscape; margin:0; }
    html,body{ background:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
  .pdf-root,.pdf-root *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .pdf-page{ width:297mm; background:var(--cream); position:relative; overflow:hidden; }
  .pdf-cover,.pdf-closing{ height:209.5mm; display:flex; align-items:center; justify-content:center; padding:16mm; page-break-after:always; }
  .pdf-break-before{ page-break-before:always; }
  .pdf-products{ padding:13mm 16mm 16mm; page-break-after:always; }

  .pdf-cover-frame{ position:relative; width:100%; height:100%; border:1px solid color-mix(in oklab,var(--brass) 60%, var(--cream)); display:flex; align-items:center; justify-content:center; }
  .pdf-cover-corner{ position:absolute; width:18mm; height:18mm; border:2px solid var(--brass); }
  .pdf-cover-corner.tl{ top:6mm; left:6mm; border-right:none; border-bottom:none; }
  .pdf-cover-corner.tr{ top:6mm; right:6mm; border-left:none; border-bottom:none; }
  .pdf-cover-corner.bl{ bottom:6mm; left:6mm; border-right:none; border-top:none; }
  .pdf-cover-corner.br{ bottom:6mm; right:6mm; border-left:none; border-top:none; }
  .pdf-cover-inner{ text-align:center; max-width:200mm; }
  .pdf-cover-logo{ height:30mm; width:auto; object-fit:contain; margin:0 auto 6mm; }
  .pdf-cover-monogram{ font-family:var(--font-display); font-weight:900; font-size:42mm; line-height:1; color:color-mix(in oklab,var(--brass) 28%, var(--cream)); margin-bottom:2mm; }
  .pdf-cover-kicker{ font-size:3.4mm; letter-spacing:.45em; text-transform:uppercase; color:var(--brass); font-weight:700; }
  .pdf-cover-title{ font-family:var(--font-display); font-weight:900; color:var(--ink); font-size:24mm; line-height:1; margin:5mm 0 0; letter-spacing:-.01em; }
  .pdf-closing-title{ font-family:var(--font-display); font-weight:900; color:var(--ink); font-size:18mm; line-height:1; margin:4mm 0 0; }
  .pdf-cover-divider{ display:flex; justify-content:center; margin:7mm 0; }
  .pdf-cover-divider span{ width:24mm; height:.6mm; background:var(--brass); position:relative; }
  .pdf-cover-divider span::before,.pdf-cover-divider span::after{ content:""; position:absolute; top:50%; transform:translateY(-50%); width:1.6mm; height:1.6mm; border-radius:50%; background:var(--brass); }
  .pdf-cover-divider span::before{ left:-5mm; } .pdf-cover-divider span::after{ right:-5mm; }
  .pdf-cover-tagline{ font-size:5mm; color:var(--ink-soft); font-weight:300; margin:0; }
  .pdf-cover-addr{ margin-top:8mm; font-size:3.6mm; letter-spacing:.06em; color:var(--muted); }

  .pdf-runhead{ display:flex; justify-content:space-between; align-items:center; border-bottom:.5mm solid var(--brass); padding-bottom:2mm; margin-bottom:7mm; }
  .pdf-runhead-brand{ font-family:var(--font-display); font-weight:700; color:var(--ink); font-size:5mm; }
  .pdf-runhead-cat{ font-size:3.2mm; letter-spacing:.2em; text-transform:uppercase; color:var(--brass); font-weight:700; }
  .pdf-cat-head{ display:flex; align-items:baseline; gap:5mm; margin-bottom:7mm; }
  .pdf-cat-head h2{ font-family:var(--font-display); font-weight:900; color:var(--ink); font-size:11mm; margin:0; }
  .pdf-cat-count{ font-size:3.4mm; color:var(--muted); letter-spacing:.05em; }
  .pdf-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:9mm 8mm; }
  .pdf-card{ break-inside:avoid; page-break-inside:avoid; background:var(--paper); border:.4mm solid var(--line); border-radius:3mm; overflow:hidden; display:flex; flex-direction:column; }
  .pdf-card-media{ aspect-ratio:4/3; background:#fff; overflow:hidden; }
  .pdf-card-media img{ width:100%; height:100%; object-fit:cover; }
  .pdf-card-body{ padding:4.5mm 5mm 5.5mm; }
  .pdf-card-row{ display:flex; align-items:baseline; justify-content:space-between; gap:3mm; }
  .pdf-card-row h3{ font-family:var(--font-display); font-weight:700; color:var(--ink); font-size:5mm; margin:0; line-height:1.1; }
