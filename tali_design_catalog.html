<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tali Design - קטלוג דיגיטלי</title>
    
    <!-- Core External Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase UMD -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <!-- Tailwind Configuration -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              rose: { 50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 300: '#fda4af', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48', 700: '#be123c', 800: '#9f1239', 900: '#881337', },
              orange: { 50: '#fff7ed', },
              slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', }
            },
            keyframes: {
              'toast-in': {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'scale-in': {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              }
            },
            animation: {
              'toast-in': 'toast-in 0.3s ease-out forwards',
              'fade-in': 'fade-in 0.2s ease-out forwards',
              'scale-in': 'scale-in 0.2s ease-out forwards',
            }
          }
        }
      }
    </script>

    <style>
      body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      @media print {
        @page { margin: 15mm; size: A4 portrait; }
        body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .print-hidden { display: none !important; }
        .print-mode { padding: 0 !important; }
        .print-grid { 
          display: grid !important; 
          grid-template-columns: repeat(3, minmax(0, 1fr)) !important; 
          gap: 2rem !important;
        }
        .print-break-inside-avoid { break-inside: avoid; }
        a { text-decoration: none !important; }
        .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl { box-shadow: none !important; }
      }
    </style>
</head>
<body class="bg-gradient-to-br from-rose-50 to-orange-50 text-slate-900 selection:bg-rose-200 overflow-x-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================================================
        // === TELEMETRY CONFIGURATION ===
        // ============================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAEx" + "aWN2D2qwnz7S" + "_8Rhv-djPsv18xONd8",
            authDomain: "tali-design.firebaseapp.com",
            projectId: "tali-design",
            storageBucket: "tali-design.firebasestorage.app",
            messagingSenderId: "299816815249",
            appId: "1:299816815249:web:19115d3034bcb39ef58d30",
            measurementId: "G-G5ZFHS45JG"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const SYS_APP_ID = 'tali-catalog-production';

        const getCol = (colName) => db.collection(`artifacts/${SYS_APP_ID}/public/data/${colName}`);
        const getDoc = (colName, id) => db.doc(`artifacts/${SYS_APP_ID}/public/data/${colName}/${id}`);

        // --- Hardware Accelerated Icon Renderer ---
        const SvgIcon = ({ name, className }) => {
            const paths = {
                lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>,
                settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
                'edit-2': <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />,
                folder: <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />,
                eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></>,
                'eye-off': <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></>,
                'trash-2': <><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>,
                'plus-circle': <><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></>,
                'file-down': <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><path d="M12 18v-6" /><path d="M9 15l3 3 3-3" /></>,
                'external-link': <><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></>,
                'wifi': <><path d="M5 12.55a11 11 0 0 1 14.08 0" /><path d="M1.42 9a16 16 0 0 1 21.16 0" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><line x1="12" y1="20" x2="12.01" y2="20" /></>,
                'wifi-off': <><line x1="2" y1="2" x2="22" y2="22" /><path d="M8.5 16.5a5 5 0 0 1 7 0" /><path d="M2 8.82a15 15 0 0 1 4.17-2.65" /><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76" /><path d="M16.85 11.25a10 10 0 0 1 2.22 1.68" /><path d="M5 13a10 10 0 0 1 5.24-2.76" /><line x1="12" y1="20" x2="12.01" y2="20" /></>,
                'map-pin': <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></>,
                'phone': <><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" /></>,
                'instagram': <><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></>,
                'facebook': <><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></>,
                'check-circle': <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                'alert-circle': <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                'alert-triangle': <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
                'x': <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ display: 'inline-block', width: '1em', height: '1em' }}>
                    {paths[name] || paths['settings']}
                </svg>
            );
        };

        const LoaderIcon = () => (
            <svg className="animate-spin w-12 h-12 text-rose-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [isOnline, setIsOnline] = useState(false);
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [pinInput, setPinInput] = useState('');
            
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('catalog');
            const [adminTab, setAdminTab] = useState('products');
            const [isPrinting, setIsPrinting] = useState(false);
            
            // --- UI Interrupt States ---
            const [toast, setToast] = useState(null);
            // Safety Interlock Modal State
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', message: '', action: null });

            // Payload structures
            const [settings, setSettings] = useState({ 
                title: '', id: null, logo: null, address: '', whatsapp: '', instagram: '', facebook: '' 
            });
            const [catalogs, setCatalogs] = useState([]);
            const [products, setProducts] = useState([]);
            const [activeCatalogId, setActiveCatalogId] = useState(null);

            // Buffers
            const [folderFormName, setFolderFormName] = useState('');
            const [settingsForm, setSettingsForm] = useState({
                title: '', logo: null, address: '', whatsapp: '', instagram: '', facebook: ''
            });
            const [formData, setFormData] = useState({
                catalogId: '', title: '', description: '', price: '', link: '', image: null
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const fileInputRef = useRef(null);
            const logoInputRef = useRef(null);

            // --- Async Notification Engine (Non-blocking I/O) ---
            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToast({ id, message, type });
                setTimeout(() => {
                    setToast(prev => prev && prev.id === id ? null : prev);
                }, 3000); // 3-second hardware wipe
            };

            // --- Rx (Receive) Logic ---
            useEffect(() => {
                auth.signInAnonymously()
                    .then(() => setIsOnline(true))
                    .catch((err) => {
                        setIsOnline(false);
                        console.error('Auth Init Error:', err);
                        showToast('כשל תקשורת לשרת: ודא חיבור או הגדרות ענן', 'error');
                    });
                
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    setUser(usr);
                    setIsOnline(!!usr);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const handleRxError = (err) => {
                    setIsOnline(false);
                    if(err.code === 'permission-denied') {
                        showToast("חסימת הרשאות: נדחתה קריאה ממסד הנתונים", "error");
                    }
                };

                const unsubSettings = getCol('site_settings').onSnapshot((snapshot) => {
                    setIsOnline(true);
                    if (!snapshot.empty) {
                        const docData = snapshot.docs[0].data();
                        const dataId = snapshot.docs[0].id;
                        setSettings({ id: dataId, ...docData });
                        
                        setSettingsForm({
                            title: docData.title || '',
                            logo: docData.logo || null,
                            address: docData.address || '',
                            whatsapp: docData.whatsapp || '',
                            instagram: docData.instagram || '',
                            facebook: docData.facebook || ''
                        });
                    }
                }, handleRxError);

                const unsubCatalogs = getCol('catalogs').onSnapshot((snapshot) => {
                    setIsOnline(true);
                    const items = [];
                    snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    items.sort((a, b) => a.timestamp - b.timestamp);
                    setCatalogs(items);
                    
                    setActiveCatalogId(prev => {
                        if (!prev && items.length > 0) {
                            const firstVisible = items.find(c => c.isVisible);
                            return firstVisible ? firstVisible.id : prev;
                        }
                        return prev;
                    });
                }, handleRxError);

                const unsubProducts = getCol('catalog_products').onSnapshot((snapshot) => {
                    setIsOnline(true);
                    const items = [];
                    snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    items.sort((a, b) => b.timestamp - a.timestamp);
                    setProducts(items);
                    setLoading(false);
                }, handleRxError);

                return () => {
                    unsubSettings();
                    unsubCatalogs();
                    unsubProducts();
                };
            }, [user]);

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinInput === '1234') {
                    setIsAdminAuthenticated(true);
                    setPinInput('');
                    showToast('אימות הצליח: גישת ניהול אושרה', 'success');
                } else {
                    showToast('שגיאת אימות: גישה נדחתה', 'error');
                }
            };

            const processImageUpload = (file, maxWidth, callback) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        callback(compressedBase64);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                processImageUpload(file, 800, (base64) => setFormData(prev => ({ ...prev, image: base64 })));
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                processImageUpload(file, 400, (base64) => setSettingsForm(prev => ({ ...prev, logo: base64 })));
            };

            // --- Tx (Transmit) Pipelines ---
            const txWrapper = async (txFunction, actionName) => {
                if (!user || !isOnline) {
                    showToast('שגיאת רשת: המערכת אינה מחוברת לענן', 'error');
                    return false;
                }
                setIsSubmitting(true);
                try {
                    await txFunction();
                    showToast(`${actionName} בוצעה בהצלחה`, 'success');
                    return true;
                } catch (err) {
                    console.error(`Tx Error [${actionName}]:`, err);
                    showToast(`כשל בעת ${actionName}: ${err.message}`, 'error');
                    return false;
                } finally {
                    setIsSubmitting(false);
                }
            };

            const updateSettings = async (e) => {
                e.preventDefault();
                // Tx Gate opened: Title is no longer mandatory to save settings.
                await txWrapper(async () => {
                    if (settings.id) await getDoc('site_settings', settings.id).update({ ...settingsForm });
                    else await getCol('site_settings').add({ ...settingsForm });
                }, 'שמירת הגדרות העסק');
            };

            const addFolder = async (e) => {
                e.preventDefault();
                if (!folderFormName) return;
                const success = await txWrapper(async () => {
                    await getCol('catalogs').add({ name: folderFormName, isVisible: true, timestamp: Date.now() });
                }, 'יצירת התיקייה');
                if (success) setFolderFormName('');
            };

            const toggleFolderVisibility = async (id, currentVisibility) => {
                await txWrapper(async () => {
                    await getDoc('catalogs', id).update({ isVisible: !currentVisibility });
                }, 'עדכון מצב תצוגה');
            };

            // --- Safety Interlock Handlers (Modals) ---
            const requestDeleteFolder = (id, name) => {
                const hasProducts = products.some(p => p.catalogId === id);
                if (hasProducts) { 
                    showToast('מחיקה נדחתה: התיקייה מכילה פריטים', 'error'); 
                    return; 
                }
                setConfirmDialog({
                    isOpen: true,
                    title: 'מחיקת קטלוג',
                    message: `האם אתה בטוח שברצונך למחוק את הקטלוג "${name}"? הפעולה אינה הפיכה והנתונים יימחקו מידית מהענן.`,
                    action: async () => {
                        const success = await txWrapper(async () => {
                            await getDoc('catalogs', id).delete();
                        }, 'מחיקת התיקייה');
                        if (success && activeCatalogId === id) setActiveCatalogId(null);
                    }
                });
            };

            const handleProductSubmit = async (e) => {
                e.preventDefault();
                if (!formData.title || !formData.image || !formData.catalogId) return;
                const success = await txWrapper(async () => {
                    await getCol('catalog_products').add({ ...formData, timestamp: Date.now() });
                }, 'הוספת המוצר');
                
                if (success) {
                    setFormData({ catalogId: formData.catalogId, title: '', description: '', price: '', link: '', image: null });
                    if (fileInputRef.current) fileInputRef.current.value = '';
                }
            };

            const requestDeleteProduct = (id, title) => {
                setConfirmDialog({
                    isOpen: true,
                    title: 'מחיקת מוצר',
                    message: `האם למחוק את המוצר "${title}" מקטלוג המערכת? הפעולה אינה הפיכה.`,
                    action: async () => {
                        await txWrapper(async () => {
                            await getDoc('catalog_products', id).delete(); 
                        }, 'מחיקת המוצר');
                    }
                });
            };

            const handlePrint = () => {
                setIsPrinting(true);
                setTimeout(() => {
                    window.print();
                    setIsPrinting(false);
                }, 500);
            };

            // --- UI Rendering ---
            if (loading) {
                return (
                    <div className="flex h-screen w-full items-center justify-center bg-rose-50 dir-rtl">
                        <div className="text-center">
                            <LoaderIcon />
                            <p className="mt-4 text-slate-600 font-medium tracking-wide">מסנכרן נתונים מול ענן Firebase...</p>
                        </div>
                    </div>
                );
            }

            const visibleCatalogs = catalogs.filter(c => c.isVisible);
            const displayedProducts = products.filter(p => p.catalogId === activeCatalogId);

            return (
                <div className="min-h-screen relative pb-10">
                    
                    {/* --- Notification Toast Overlay --- */}
                    {toast && (
                        <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[100] animate-toast-in print-hidden">
                            <div className={`flex items-center gap-3 px-6 py-4 rounded-xl shadow-2xl text-white font-medium ${toast.type === 'success' ? 'bg-slate-900' : 'bg-red-600'}`}>
                                <SvgIcon name={toast.type === 'success' ? 'check-circle' : 'alert-circle'} className="w-5 h-5" />
                                {toast.message}
                                <button onClick={() => setToast(null)} className="mr-4 hover:opacity-75 focus:outline-none">
                                    <SvgIcon name="x" className="w-4 h-4" />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- Safety Interlock Confirmation Modal --- */}
                    {confirmDialog.isOpen && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center print-hidden bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 animate-scale-in">
                                <div className="flex items-center gap-4 text-red-600 mb-4">
                                    <div className="bg-red-50 p-3 rounded-full">
                                        <SvgIcon name="alert-triangle" className="w-6 h-6" />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-900">{confirmDialog.title}</h3>
                                </div>
                                <p className="text-slate-600 mb-8 leading-relaxed">{confirmDialog.message}</p>
                                <div className="flex gap-4 justify-end">
                                    <button 
                                        onClick={() => setConfirmDialog({ isOpen: false, title: '', message: '', action: null })}
                                        className="px-6 py-2.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-300"
                                    >
                                        ביטול
                                    </button>
                                    <button

                                                {product.link && (
                                                    <a href={product.link} target="_blank" rel="noopener noreferrer" className="mt-6 inline-flex items-center justify-center w-full bg-rose-50 text-rose-700 hover:bg-rose-100 hover:text-rose-800 font-bold py-3 px-4 rounded-xl transition-colors print:bg-transparent print:border-2 print:border-slate-800 print:text-slate-800 print:py-2">
                                                        לפרטים והזמנה <SvgIcon name="external-link" className="w-4 h-4 mr-2" />
                                                    </a>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {visibleCatalogs.length === 0 && !isPrinting && (
                                    <div className="flex flex-col items-center justify-center py-20 text-slate-400 bg-white/50 rounded-3xl border border-dashed border-rose-200">
                                        <SvgIcon name="folder" className="w-16 h-16 mb-4 opacity-50 text-rose-300" />
                                        <p className="text-xl font-medium">אין קטלוגים פתוחים לקהל כרגע.</p>
                                    </div>
                                )}
                                
                                {visibleCatalogs.length > 0 && displayedProducts.length === 0 && !isPrinting && (
                                    <div className="flex flex-col items-center justify-center py-20 text-slate-400 bg-white/50 rounded-3xl border border-dashed border-rose-200">
                                        <SvgIcon name="image" className="w-16 h-16 mb-4 opacity-50 text-rose-300" />
                                        <p className="text-xl font-medium">אין מוצרים בקטלוג זה.</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
